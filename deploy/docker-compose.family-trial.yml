services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-babygrow}
      POSTGRES_USER: ${POSTGRES_USER:-babygrow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-babygrow} -d ${POSTGRES_DB:-babygrow}"]
      interval: 5s
      timeout: 5s
      retries: 20

  ollama:
    image: ollama/ollama:latest
    profiles: ["container-ollama"]
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"

  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    image: deploy-api:latest
    environment:
      BGH_DATABASE_URL: postgresql://${POSTGRES_USER:-babygrow}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-babygrow}
      BGH_RUNTIME_DB_BACKEND: postgres
      BGH_REQUIRE_FAMILY_AUTH: "1"
      BGH_FAMILY_TRIAL_MAX_FAMILIES: ${BGH_FAMILY_TRIAL_MAX_FAMILIES:-10}
      BGH_CORS_ORIGINS: ${BGH_CORS_ORIGINS:-http://localhost:3000}
      BGH_LLM_BACKEND: local
      BGH_OLLAMA_URL: ${BGH_OLLAMA_URL:-http://host.docker.internal:11434}
      BGH_OLLAMA_MODEL: ${BGH_OLLAMA_MODEL:-qwen2.5:3b-instruct}
      BGH_ANTHROPIC_API_KEY: ${BGH_ANTHROPIC_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"

  feedback-digest:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    image: deploy-api:latest
    profiles: ["feedback-email"]
    environment:
      BGH_DATABASE_URL: postgresql://${POSTGRES_USER:-babygrow}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-babygrow}
      BGH_RUNTIME_DB_BACKEND: postgres
      BGH_FEEDBACK_DIGEST_TO: ${BGH_FEEDBACK_DIGEST_TO:-wpb889@outlook.com}
      BGH_FEEDBACK_DIGEST_FROM: ${BGH_FEEDBACK_DIGEST_FROM:-}
      FEEDBACK_DIGEST_INTERVAL_SECONDS: ${FEEDBACK_DIGEST_INTERVAL_SECONDS:-604800}
      FEEDBACK_DIGEST_LOOKBACK_DAYS: ${FEEDBACK_DIGEST_LOOKBACK_DAYS:-7}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_TLS: ${SMTP_TLS:-1}
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - "sh"
      - "-c"
      - |
        while true; do
          uv run --no-sync python -m src.scripts.feedback_digest --send --days "$${FEEDBACK_DIGEST_LOOKBACK_DAYS:-7}" || true
          sleep "$${FEEDBACK_DIGEST_INTERVAL_SECONDS:-604800}"
        done
    restart: unless-stopped

  web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.web
      args:
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-/api}
    environment:
      API_INTERNAL_BASE: ${API_INTERNAL_BASE:-http://api:8000}
    depends_on:
      - api
    ports:
      - "3000:3000"

  cloudflared:
    image: cloudflare/cloudflared:latest
    profiles: ["named-tunnel"]
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN:-}
    depends_on:
      - web
    restart: unless-stopped

  ngrok:
    image: ngrok/ngrok:latest
    profiles: ["ngrok"]
    command:
      - "http"
      - "--url=${NGROK_DOMAIN:-}"
      - "http://web:3000"
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN:-}
    depends_on:
      - web
    ports:
      - "4040:4040"
    restart: unless-stopped

volumes:
  postgres_data:
  ollama_data:
